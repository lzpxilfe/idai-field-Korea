<div *ngIf="shouldShow()" class="korean-fieldwork-soil-color-panel">
    <div class="korean-fieldwork-soil-color-header">
        <span class="mdi mdi-palette"></span>
        <span>토색 빠른 기록</span>
    </div>

    <div class="korean-fieldwork-soil-color-section">
        <div class="korean-fieldwork-soil-color-label">먼셀 조합</div>
        <div class="korean-fieldwork-soil-color-builder-preview">
            <span>{{canRecordPhotoSwatches() ? getActiveSoilColorRowNumber() + '층에 입력' : '현재 먼셀값'}}</span>
            <button type="button"
                    class="btn korean-fieldwork-soil-color-builder-value"
                    (click)="applyMunsellPreset(getMunsellBuilderValue())">
                {{getMunsellBuilderValue()}}
            </button>
        </div>
        <div class="korean-fieldwork-soil-color-builder-row">
            <div class="korean-fieldwork-soil-color-builder-label">숫자</div>
            <div class="korean-fieldwork-soil-color-chip-row">
                <button *ngFor="let option of munsellHueNumberOptions"
                        type="button"
                        class="btn korean-fieldwork-soil-color-chip"
                        [class.active]="builderHueNumber === option.value"
                        (click)="setMunsellBuilderPart('hueNumber', option.value)">
                    {{option.label}}
                </button>
            </div>
        </div>
        <div class="korean-fieldwork-soil-color-builder-row">
            <div class="korean-fieldwork-soil-color-builder-label">알파벳</div>
            <div class="korean-fieldwork-soil-color-chip-row">
                <button *ngFor="let option of munsellHueFamilyOptions"
                        type="button"
                        class="btn korean-fieldwork-soil-color-chip"
                        [class.active]="builderHueFamily === option.value"
                        (click)="setMunsellBuilderPart('hueFamily', option.value)">
                    {{option.label}}
                </button>
            </div>
        </div>
        <div class="korean-fieldwork-soil-color-builder-row">
            <div class="korean-fieldwork-soil-color-builder-label">명도</div>
            <div class="korean-fieldwork-soil-color-chip-row">
                <button *ngFor="let option of munsellValueOptions"
                        type="button"
                        class="btn korean-fieldwork-soil-color-chip"
                        [class.active]="builderValue === option.value"
                        (click)="setMunsellBuilderPart('value', option.value)">
                    {{option.label}}
                </button>
            </div>
        </div>
        <div class="korean-fieldwork-soil-color-builder-row">
            <div class="korean-fieldwork-soil-color-builder-label">채도</div>
            <div class="korean-fieldwork-soil-color-chip-row">
                <button *ngFor="let option of munsellChromaOptions"
                        type="button"
                        class="btn korean-fieldwork-soil-color-chip"
                        [class.active]="builderChroma === option.value"
                        (click)="setMunsellBuilderPart('chroma', option.value)">
                    {{option.label}}
                </button>
            </div>
        </div>

        <input *ngIf="canRecordLayerMunsell()"
               class="form-control korean-fieldwork-soil-color-input"
               [ngModel]="getValue(fields.manualMunsell)"
               (ngModelChange)="setLayerMunsell($event)"
               placeholder="예: 10YR 4/3">

        <button *ngIf="canRecordPhotoSwatches()"
                type="button"
                class="btn korean-fieldwork-soil-color-add-row"
                (click)="addEmptyNumberedSwatch()">
            <span class="mdi mdi-plus"></span>
            <span>번호 추가</span>
        </button>

        <div *ngIf="canRecordPhotoSwatches()"
             class="korean-fieldwork-soil-color-row-number-editor">
            <span class="korean-fieldwork-soil-color-row-number-label">층 번호</span>
            <input type="number"
                   min="1"
                   class="form-control korean-fieldwork-soil-color-row-number-input"
                   [ngModel]="getActiveSoilColorRowNumberInput()"
                   (ngModelChange)="setActiveSoilColorRowNumberInput($event)">
            <button type="button"
                    class="btn korean-fieldwork-soil-color-row-number-button"
                    (click)="applyActiveSoilColorRowNumber()">
                변경
            </button>
        </div>

        <div *ngIf="canRecordPhotoSwatches()"
             class="korean-fieldwork-soil-color-layer-list">
            <div *ngFor="let row of getSoilColorRows()"
                 class="korean-fieldwork-soil-color-layer-item">
                <div class="korean-fieldwork-soil-color-layer-row"
                     [class.active]="row.number === getActiveSoilColorRowNumber()">
                    <button type="button"
                            class="btn korean-fieldwork-soil-color-layer-number"
                            (click)="selectSoilColorRow(row.number)">
                        {{row.number}}
                    </button>
                    <input class="form-control korean-fieldwork-soil-color-layer-input"
                           [ngModel]="row.value"
                           (focus)="selectSoilColorRow(row.number)"
                           (ngModelChange)="setSoilProfileColorRowValue(row.number, $event)"
                           placeholder="먼셀값">
                </div>
                <div *ngIf="row.sampleLocationLabel || row.sampleRgbLabel"
                     class="korean-fieldwork-soil-color-layer-sample-source">
                    <span class="mdi mdi-eyedropper-variant"></span>
                    <span *ngIf="row.sampleLocationLabel">{{row.sampleLocationLabel}}</span>
                    <span *ngIf="!row.sampleLocationLabel">사진 색상 샘플</span>
                    <span *ngIf="row.sampleRgbLabel"
                          class="korean-fieldwork-soil-color-layer-sample-rgb">
                        {{row.sampleRgbLabel}}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="hasField(fields.assistCandidates)"
         class="korean-fieldwork-soil-color-section">
        <div class="korean-fieldwork-soil-color-label">사진 판독 후보</div>
        <textarea class="form-control korean-fieldwork-soil-color-textarea korean-fieldwork-soil-color-candidates"
                  [ngModel]="getValue(fields.assistCandidates)"
                  (ngModelChange)="setAssistCandidates($event)"
                  placeholder="사진에서 읽은 먼셀 후보가 여기에 표시됩니다"></textarea>
        <div *ngIf="getAssistSampleSourceLabel()"
             class="korean-fieldwork-soil-color-sample-source">
            <span class="mdi mdi-eyedropper-variant"></span>
            <span>{{getAssistSampleSourceLabel()}}</span>
        </div>
        <div *ngIf="getAssistCandidateOptions().length > 0"
             class="korean-fieldwork-soil-color-chip-row">
            <button *ngFor="let option of getAssistCandidateOptions()"
                    type="button"
                    class="btn korean-fieldwork-soil-color-chip"
                    (click)="applyAssistCandidate(option)">
                {{option}}
            </button>
        </div>
    </div>

    <div *ngIf="canRecordLayerMunsell() && hasField(fields.moistureState)"
         class="korean-fieldwork-soil-color-section">
        <div class="korean-fieldwork-soil-color-label">수분 상태</div>
        <div class="korean-fieldwork-soil-color-chip-row">
            <button *ngFor="let option of moistureOptions"
                    type="button"
                    class="btn korean-fieldwork-soil-color-chip"
                    [class.active]="getValue(fields.moistureState) === option.value"
                    (click)="setValue(fields.moistureState, option.value)">
                {{option.label}}
            </button>
        </div>
    </div>

    <div class="korean-fieldwork-soil-color-section">
        <div class="korean-fieldwork-soil-color-label">토색 메모</div>
        <textarea class="form-control korean-fieldwork-soil-color-textarea"
                  [ngModel]="canRecordLayerMunsell() ? getValue(fields.soilColorNote) : getValue(fields.profileColorNote)"
                  (ngModelChange)="setValue(canRecordLayerMunsell() ? fields.soilColorNote : fields.profileColorNote, $event)"
                  placeholder="색 변화, 보정 필요 여부, 조명 조건 등을 적어두세요."></textarea>
    </div>

    <div *ngIf="canRecordPhotoSwatches() && hasField(fields.profileCaptureNote)"
         class="korean-fieldwork-soil-color-section">
        <div class="korean-fieldwork-soil-color-label">사진 메모</div>
        <textarea class="form-control korean-fieldwork-soil-color-textarea"
                  [ngModel]="getValue(fields.profileCaptureNote)"
                  (ngModelChange)="setValue(fields.profileCaptureNote, $event)"
                  placeholder="사진 번호, 보정판 위치, 토색 판독에 필요한 특이사항을 적어두세요."></textarea>
    </div>
</div>
