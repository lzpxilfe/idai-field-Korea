name: Desktop
permissions:
  contents: read
on:
  push:
    paths:
      - "core/**"
      - "desktop/**"
      - "tools/korean-fieldwork-*.js"
      - "tools/ci-retry-command.js"
      - "README.md"
      - "docs/korean-fieldwork/**"
      - "START_FIELD_DESKTOP.cmd"
      - "START_FIELD_DESKTOP_TO_OTHER_DRIVE.cmd"
      - "INSTALL_FIELD_DESKTOP_SHORTCUT.cmd"
      - "run-idai-field-ko.ps1"
      - "tools/windows/**"
      - "BUILD_AND_INSTALL_TABLET_APK.cmd"
      - "BUILD_AND_INSTALL_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "BUILD_AND_DOWNLOAD_TABLET_APK.cmd"
      - "BUILD_AND_DOWNLOAD_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "INSTALL_LATEST_TABLET_APK.cmd"
      - "INSTALL_LATEST_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "DOWNLOAD_LATEST_TABLET_APK.cmd"
      - "DOWNLOAD_LATEST_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "core/**"
      - "desktop/**"
      - "tools/korean-fieldwork-*.js"
      - "tools/ci-retry-command.js"
      - "README.md"
      - "docs/korean-fieldwork/**"
      - "START_FIELD_DESKTOP.cmd"
      - "START_FIELD_DESKTOP_TO_OTHER_DRIVE.cmd"
      - "INSTALL_FIELD_DESKTOP_SHORTCUT.cmd"
      - "run-idai-field-ko.ps1"
      - "tools/windows/**"
      - "BUILD_AND_INSTALL_TABLET_APK.cmd"
      - "BUILD_AND_INSTALL_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "BUILD_AND_DOWNLOAD_TABLET_APK.cmd"
      - "BUILD_AND_DOWNLOAD_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "INSTALL_LATEST_TABLET_APK.cmd"
      - "INSTALL_LATEST_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - "DOWNLOAD_LATEST_TABLET_APK.cmd"
      - "DOWNLOAD_LATEST_TABLET_APK_TO_OTHER_DRIVE.cmd"
      - ".github/workflows/desktop.yml"
jobs:
  Tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Korean fieldwork parity check
        run: node tools/korean-fieldwork-parity-check.js
      - name: Run Korean fieldwork media contract check
        run: node tools/korean-fieldwork-media-contract-check.js
      - name: Install dependencies
        run: node tools/ci-retry-command.js npm run bootstrap
      - name: Build core
        run: npm run build
        working-directory: core
      - name: Run core unit tests
        run: npm run test
        working-directory: core
      - name: Run desktop unit tests
        run: npm run test
        working-directory: desktop
      - name: Run Field Hub integration tests
        if: ${{ github.event_name == 'push' && (contains(github.event.head_commit.message, '[hub]') || contains(github.event.head_commit.message, '[full-ci]')) }}
        run: npm run test:hub-integration
        working-directory: desktop
  E2E:
    if: ${{ github.event_name == 'push' && (contains(github.event.head_commit.message, '[e2e]') || contains(github.event.head_commit.message, '[full-ci]') || contains(github.event.head_commit.message, '[handoff-e2e]')) }}
    timeout-minutes: 90
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: node tools/ci-retry-command.js npm run bootstrap
      - name: Build core
        run: npm run build
        working-directory: core
      - name: Run Korean fieldwork handoff e2e tests
        if: ${{ contains(github.event.head_commit.message, '[handoff-e2e]') && !contains(github.event.head_commit.message, '[e2e]') && !contains(github.event.head_commit.message, '[full-ci]') }}
        run: npm run e2e:korean-fieldwork-handoff
        working-directory: desktop
      - name: Run e2e tests
        if: ${{ contains(github.event.head_commit.message, '[e2e]') || contains(github.event.head_commit.message, '[full-ci]') }}
        run: npm run e2e
        working-directory: desktop
  Build:
    name: Build (${{ matrix.os.name }})
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[full-ci]')) }}
    environment: desktop-release-signing
    strategy:
      matrix:
        os:
          - { name: 'Linux', version: 'ubuntu-latest' }
          - { name: 'macOS', version: 'macos-latest' }
          - { name: 'Windows', version: 'windows-latest' }
      fail-fast: false
    runs-on: ${{ matrix.os.version }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install root node modules
      run: node tools/ci-retry-command.js npm i
    - name: Install and link package node modules 
      run: node tools/ci-retry-command.js npm run bootstrap
    - name: Build core
      run: npm run build
      working-directory: core
    - name: Build desktop
      run: npm run build
      working-directory: desktop
    - name: Create macOS package
      run: npm run package:mac
      if: runner.os == 'macOS'
      env:
        CSC_LINK: ${{ secrets.MAC_CERT }}
        CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PW }}
        MAC_NOTARIZE: ${{ contains(github.event.head_commit.message, '[notarize]') && 'true' || 'false' }}
        MAC_NOTARIZE_AID: ${{ secrets.MAC_NOTARIZE_AID }}
        MAC_NOTARIZE_PW: ${{ secrets.MAC_NOTARIZE_PW }}
        MAC_NOTARIZE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
      working-directory: desktop
    - name: Require Windows signing identity
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        CSC_LINK: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE }}
        CSC_KEY_PASSWORD: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_PASSWORD }}
        EXPECTED_PUBLISHER: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_PUBLISHER }}
        EXPECTED_CERT_SHA256: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_SHA256 }}
      run: |
        foreach ($name in 'CSC_LINK', 'CSC_KEY_PASSWORD', 'EXPECTED_PUBLISHER', 'EXPECTED_CERT_SHA256') {
          if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
            throw "Required Windows signing secret '$name' is missing."
          }
        }
    - name: Create Windows package
      run: npm run package:win
      if: runner.os == 'Windows'
      env:
        CSC_LINK: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE }}
        CSC_KEY_PASSWORD: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_PASSWORD }}
      working-directory: desktop
    - name: Verify Windows Authenticode signature
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        EXPECTED_PUBLISHER: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_PUBLISHER }}
        EXPECTED_CERT_SHA256: ${{ secrets.IDAI_FIELD_WINDOWS_CERTIFICATE_SHA256 }}
      run: |
        $installers = @(Get-ChildItem desktop/release -File -Filter 'Field-Desktop-*-Windows.exe')
        if ($installers.Count -eq 0) {
          throw 'No Windows installer was produced.'
        }
        foreach ($installer in $installers) {
          ./tools/windows/verify_authenticode.ps1 `
            -Path $installer.FullName `
            -ExpectedPublisher $env:EXPECTED_PUBLISHER `
            -ExpectedCertificateSha256 $env:EXPECTED_CERT_SHA256
        }
    - name: Upload verified Windows package
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: field-desktop-windows-signed
        path: desktop/release/Field-Desktop-*-Windows.exe
        if-no-files-found: error
    - name: Create Linux package
      run: npm run package:lnx
      if: runner.os == 'Linux'
      working-directory: desktop
